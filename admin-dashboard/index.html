<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الحلقة القرآنية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1 class="title">الحلقة القرآنية</h1>
        <div class="header-actions">
            <select id="dateSelector" class="date-selector">
                <option value="today">اليوم</option>
                <option value="yesterday">أمس</option>
                <option value="this-week">هذا الأسبوع</option>
            </select>
            <button class="add-student-btn" onclick="showAddStudentModal()">
                <span>+</span> طالب جديد
            </button>
        </div>
    </header>

    <main class="main-content">
        <section class="stats-container">
            <div class="stat-card">
                <h3 class="stat-number">25</h3>
                <p class="stat-label">إجمالي الطلاب</p>
            </div>
            <div class="stat-card">
                <h3 class="stat-number">22</h3>
                <p class="stat-label">حضور اليوم</p>
            </div>
            <div class="stat-card">
                <h3 class="stat-number">18</h3>
                <p class="stat-label">أكمل الحفظ</p>
            </div>
            <div class="stat-card">
                <h3 class="stat-number">3</h3>
                <p class="stat-label">طلبات دعم</p>
            </div>
        </section>

        <section class="students-section">
            <h2 class="section-title">حالة الطلاب اليوم</h2>
            <div class="table-container">
                <table class="students-table">
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>حالة الحضور</th>
                            <th>حفظ اليوم</th>
                            <th>المراجعة</th>
                            <th>الخطة</th>
                            <th>ملاحظة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                        <!-- سيتم ملؤها بالبيانات -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- نافذة إضافة طالب جديد -->
    <div id="addStudentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>إضافة طالب جديد</h3>
                <span class="close" onclick="hideAddStudentModal()">&times;</span>
            </div>
            <form id="addStudentForm" class="modal-body">
                <div class="form-group">
                    <label>الاسم:</label>
                    <input type="text" id="studentName" required>
                </div>
                <div class="form-group">
                    <label>رقم الجوال:</label>
                    <input type="tel" id="studentPhone" required>
                </div>
                <div class="form-group">
                    <label>خطة الحفظ اليومية:</label>
                    <select id="dailyPlan" required>
                        <option value="">اختر الخطة ...</option>
                        <option value="5-ayahs">٥ آيات يومياً</option>
                        <option value="10-ayahs">١٠ آيات يومياً</option>
                        <option value="half-page">نصف صفحة يومياً</option>
                        <option value="full-page">صفحة كاملة يومياً</option>
                        <option value="custom">مخصص...</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="cancel-btn" onclick="hideAddStudentModal()">إلغاء</button>
                    <button type="submit" class="submit-btn">إضافة</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
