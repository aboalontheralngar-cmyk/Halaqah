name: Build APK Release

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: Build a staged APK or a production-signed APK
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: apk-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Validate production secrets
        if: ${{ inputs.release_channel == 'production' }}
        shell: bash
        env:
          ANDROID_APPLICATION_ID: ${{ secrets.ANDROID_APPLICATION_ID }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          for value in ANDROID_APPLICATION_ID ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD SUPABASE_URL SUPABASE_PUBLISHABLE_KEY; do
            if [ -z "${!value}" ]; then
              echo "Missing required production secret: $value" >&2
              exit 1
            fi
          done
          case "$ANDROID_APPLICATION_ID" in
            com.example.*) echo "ANDROID_APPLICATION_ID must not use com.example" >&2; exit 1 ;;
          esac
          case "$SUPABASE_URL" in
            https://*.supabase.co) ;;
            *) echo "SUPABASE_URL must be an HTTPS Supabase project URL" >&2; exit 1 ;;
          esac

      - name: Prepare production signing
        if: ${{ inputs.release_channel == 'production' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/halaqah-release.jks
          printf 'storeFile=halaqah-release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_ALIAS" "$ANDROID_KEY_PASSWORD" \
            > android/key.properties

      - name: Build APK
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
          HALAQAH_REQUIRE_RELEASE_SIGNING: ${{ inputs.release_channel == 'production' && 'true' || 'false' }}
          HALAQAH_APPLICATION_ID: ${{ inputs.release_channel == 'production' && secrets.ANDROID_APPLICATION_ID || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          build_args=(--release)
          if [ "$RELEASE_CHANNEL" = "production" ]; then
            build_args+=("--dart-define=SUPABASE_URL=$SUPABASE_URL")
            build_args+=("--dart-define=SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY")
            build_args+=(--obfuscate --split-debug-info=build/symbols)
          fi
          flutter build apk "${build_args[@]}"

      - name: Verify signature and checksum
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: |
          mkdir -p build/release-artifacts
          artifact="build/release-artifacts/halaqah-${RELEASE_CHANNEL}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$artifact"
          apksigner_path="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          if [ -z "$apksigner_path" ]; then
            echo "Android apksigner was not found" >&2
            exit 1
          fi
          "$apksigner_path" verify --verbose "$artifact"
          sha256sum "$artifact" > "${artifact}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: halaqah-${{ inputs.release_channel }}-apk-${{ github.run_number }}
          path: |
            build/release-artifacts/*
            build/symbols/**
          if-no-files-found: error
          retention-days: 30

      - name: Remove signing material
        if: ${{ always() }}
        shell: bash
        run: rm -f android/key.properties android/app/halaqah-release.jks
